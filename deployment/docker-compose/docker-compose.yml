name: books-app
services:
  db-server:
    image: postgres:17.10-alpine3.24
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: books-db
    volumes:
      - "C:/Users/fing.labcom/Documents/Programacion-Distribuida/postgres_data:/var/lib/postgresql/data"
    ports:
        - "5431:5432"
  consul:
    image: consul:1.15.4
    command: |
      agent -dev
      -ui
      -bind 0.0.0.0
      -client 0.0.0.0
    ports:
      - "8500:8500"
  proxy:
    image: traefik:3.7.5
    command: |
      --api.insecure=true
      --api.dashboard=true
      --providers.consulcatalog=true
      --providers.consulcatalog.endpoint.address=consul:8500
      --providers.consulcatalog.exposedbydefault=false
      --providers.consulcatalog.refreshinterval=5s
    ports:
      - 8888:8080
      - 8080:80
      - 8082:8082


  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    environment:
        QUARKUS_DATASOURCE_URL: jdbc:postgresql://db-server:5432/books-db
        QUARKUS_DATASOURCE_USERNAME: postgres
        QUARKUS_DATASOURCE_PASSWORD: postgres
        QUARKUS_HTTP_PORT: QUARKUS_HTTP_PORT
        CONSUL_HOST: consul
        CONSUL_PORT: 8500
#    ports:
#      - 8070:8070
  books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: books-app
    environment:
      QUARKUS_DATASOURCE_URL: jdbc:postgresql://db-server:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
#    ports:
#      - 8070:8070
  customers:
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: customers-app
    environment:
#      QUARKUS_DATASOURCE_URL: jdbc:postgresql://db-server:5432/books20262026
#      QUARKUS_DATASOURCE_USERNAME: postgres
#      QUARKUS_DATASOURCE_PASSWORD: labcom,2015
      SERVER_PORT: 8080
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
#    ports:
#      - 8070:8070
  web-app:
    build:
      context: ../../app-web
      dockerfile: Dockerfile
    container_name: web-app
    ports:
      - 5173:80
