  name: telemetria
  services:
    db-server:
      image: postgres:17.10-alpine3.24
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: books-db
      volumes:
        - "C:/Users/Andres/IdeaProjects/postgres_data:/var/lib/postgresql/data"
      ports:
        - "5431:5432"
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres -d books-db" ]
        interval: 5s
        timeout: 5s
        retries: 5
    consul:
      image: consul:1.15.4
      command: |
        agent -dev
        -ui
        -bind 0.0.0.0
        -client 0.0.0.0
      ports:
        - "8500:8500"
    proxy:
      image: traefik:3.7.5
      command: |
        --api.insecure=true
        --api.dashboard=true
        --entryPoints.http.address=":80"
        --entryPoints.traefik.address=":8080"
        --entryPoints.metrics.address=":8082"
        --providers.consulCatalog
        --providers.consulCatalog.endpoint.address=consul:8500
        --providers.consulCatalog.exposedByDefault=false
        --providers.consulCatalog.refreshInterval=5s
        --metrics.prometheus=true
        --metrics.prometheus.entryPoint=metrics

      ports:
        - 8888:8080
        - 8080:80
    postgresql-exporter:
      image: prometheuscommunity/postgres-exporter
      environment:
        DATA_SOURCE_URI: "db-server:5432/books-db?sslmode=disable"
        DATA_SOURCE_USER: postgres
        DATA_SOURCE_PASS: postgres
    prometheus:
      image: prom/prometheus:latest
      volumes:
        - ./configs:/etc/prometheus
      ports:
        - 9090:9090
    graphana:
      image: grafana/grafana:latest
      ports:
        - 3000:3000


    authors:
      build:
        context: ../../app-authors
        dockerfile: src/main/docker/Dockerfile.jvm
      container_name: authors-app
      depends_on:
        db-server:
          condition: service_healthy
      environment:
        QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
        QUARKUS_DATASOURCE_USERNAME: postgres
        QUARKUS_DATASOURCE_PASSWORD: postgres
        QUARKUS_HTTP_PORT: 8080
        CONSUL_HOST: consul
        CONSUL_PORT: 8500
        QUARKUS_FLYWAY_MIGRATE-AT-START: true
      expose:
        - 8080
      ports:
        - 8070:8080
    books:
      build:
        context: ../../app-books
        dockerfile: src/main/docker/Dockerfile.jvm
      container_name: books-app
      depends_on:
        db-server:
          condition: service_healthy
      environment:
        QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
        QUARKUS_DATASOURCE_USERNAME: postgres
        QUARKUS_DATASOURCE_PASSWORD: postgres
        QUARKUS_HTTP_PORT: 8080
        CONSUL_HOST: consul
        CONSUL_PORT: 8500
